spring.application.name=Flexislot

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/flexislot}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:winners}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
jwt.secret=${JWT_SECRET:AhY6Dh73VxzQ9FjJ2sMvLp30BcRxaKsY}
jwt.expiration=${JWT_EXPIRATION:3600000}

# Server Configuration
server.port=${PORT:8080}

# CORS Configuration (used in SecurityConfig)
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}
